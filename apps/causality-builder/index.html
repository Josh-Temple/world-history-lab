<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Causality Builder</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <header>
        <p><a href="/">← Back to World History Lab</a></p>
        <h1>Causality Builder</h1>
        <p class="lead">Practice why one event contributed to another with direct causal links and cause categories.</p>
      </header>

      <section class="card setup-card" aria-labelledby="setup-title">
        <h2 id="setup-title">Practice setup</h2>

        <label for="quality-select">Minimum quality</label>
        <select id="quality-select">
          <option value="reviewed">Reviewed+</option>
          <option value="draft">Include drafts</option>
        </select>

        <label for="unit-select">Unit</label>
        <select id="unit-select"></select>

        <label for="mode-select">Mode</label>
        <select id="mode-select">
          <option value="direct_effect">Direct effect</option>
          <option value="cause_category">Cause category</option>
        </select>

        <p id="status-line" class="muted"></p>
      </section>

      <section class="card" aria-live="polite">
        <h2>Question</h2>
        <p id="question">Loading causality data…</p>
        <div id="choices" class="choices"></div>
        <p id="feedback" class="feedback"></p>
        <p id="explanation" class="explanation"></p>
        <button id="next" type="button" disabled>Next question</button>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
