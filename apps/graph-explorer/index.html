<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Graph Explorer · World History Lab</title>
    <style>
      :root {
        --bg: #f8fafc;
        --panel: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --accent: #0f766e;
        --border: #dbe2ea;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(1100px, calc(100% - 1.5rem));
        margin: 1rem auto 2rem;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.75rem;
      }

      .topbar a {
        color: var(--accent);
        font-weight: 600;
      }

      #controls {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.75rem;
        display: flex;
        gap: 0.75rem;
        align-items: center;
        flex-wrap: wrap;
      }

      #controls select {
        min-width: 260px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.5rem;
        background: #fff;
      }

      #layout {
        margin-top: 0.75rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      #graph, #details {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.75rem;
        min-height: 480px;
      }

      #graph {
        overflow: auto;
      }

      .node {
        width: 100%;
        border: 1px solid var(--border);
        background: #f9fbfd;
        border-radius: 8px;
        padding: 0.6rem;
        margin-bottom: 0.5rem;
        text-align: left;
        cursor: pointer;
      }

      .node:hover,
      .node:focus-visible {
        border-color: #9cc7c1;
        background: #eef9f6;
      }

      .node.active {
        border-color: #0f766e;
        background: #e6f7f4;
      }

      .node-title {
        font-weight: 700;
      }

      .node-meta {
        margin-top: 0.25rem;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .related-list {
        list-style: none;
        padding: 0;
        margin: 0.5rem 0 1rem;
      }

      .related-list li {
        margin-bottom: 0.35rem;
      }

      .related-btn {
        border: 0;
        background: none;
        color: var(--accent);
        padding: 0;
        text-align: left;
        cursor: pointer;
        text-decoration: underline;
      }

      .muted { color: var(--muted); }

      @media (max-width: 900px) {
        #layout {
          grid-template-columns: 1fr;
        }

        #graph, #details {
          min-height: 360px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <h1>Event Graph Explorer</h1>
        <a href="/">← Home</a>
      </div>

      <section id="controls">
        <label for="unit-filter">Unit</label>
        <select id="unit-filter"></select>
        <span id="count" class="muted"></span>
      </section>

      <section id="layout">
        <div id="graph" aria-live="polite"></div>
        <div id="details" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
