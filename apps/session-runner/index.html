<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guided Session Runner</title>
    <style>
      body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #f8fafc; color: #0f172a; }
      main { width: min(1100px, calc(100% - 1.5rem)); margin: 1rem auto 1.2rem; display: grid; gap: 0.75rem; }
      .panel { background: #fff; border: 1px solid #dbe2ea; border-radius: 12px; padding: 0.75rem; }
      .row { display: flex; justify-content: space-between; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
      #progress { color: #334155; font-size: 0.95rem; }
      #mode-label { color: #0f766e; font-weight: 700; }
      #mode-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; }
      .mode-chip { min-height: 38px; border: 1px solid #cbd5e1; border-radius: 999px; padding: 0.3rem 0.7rem; background: #fff; color: #0f172a; font-weight: 700; }
      .mode-chip.active { background: #0f766e; color: #fff; border-color: #0f766e; }
      #unit-label { font-weight: 700; color: #0f172a; }
      #unit-progress-text { color: #334155; font-size: 0.9rem; }
      #progress-track { width: min(360px, 100%); height: 10px; border-radius: 999px; background: #e2e8f0; overflow: hidden; }
      #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #14b8a6, #0f766e); transition: width 180ms ease; }
      #app { min-height: 72vh; }
      iframe { width: 100%; min-height: 72vh; border: 1px solid #cbd5e1; border-radius: 10px; background: #fff; }
      button { min-height: 42px; border: 0; border-radius: 10px; padding: 0.5rem 0.9rem; font-weight: 700; cursor: pointer; }
      #next-step { background: #0f766e; color: #fff; }
      #restart { background: #e2e8f0; color: #0f172a; }
    </style>
  </head>
  <body>
    <main>
      <section class="panel row">
        <h1>Guided Learning Session</h1>
        <div id="progress" aria-live="polite"></div>
      </section>

      <section class="panel">
        <div id="unit-label" aria-live="polite">Unit: —</div>
        <div class="row" style="margin-top: 0.4rem;">
          <div id="unit-progress-text" aria-live="polite">Progress: 0%</div>
          <div id="progress-track" role="progressbar" aria-label="Unit progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="progress-fill"></div>
          </div>
        </div>
      </section>

      <section class="panel row">
        <p id="mode-help">Finish a few questions, then continue to the next mode.</p>
        <div id="mode-label" aria-live="polite">Mode: Timeline</div>
      </section>

      <section class="panel row">
        <div><strong>Switch mode:</strong> keep your progress while changing practice type.</div>
        <div id="mode-selector" aria-label="Mode selector"></div>
      </section>

      <section id="app" class="panel" aria-live="polite"></section>

      <section class="panel row">
        <p>Complete each mode block, then continue.</p>
        <div>
          <button id="restart" type="button">Restart Session</button>
          <button id="next-step" type="button">Complete Question</button>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
