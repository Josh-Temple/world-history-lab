<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World History Lab</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; line-height: 1.5; }
      h1 { margin-bottom: 0.5rem; }
      ul { padding-left: 1.2rem; }
      .counts li { margin: 0.25rem 0; }
    </style>
  </head>
  <body>
    <h1>World History Lab</h1>
    <p>Shared dataset and mini apps for history practice.</p>

    <h2>Dataset counts</h2>
    <ul class="counts">
      <li>Events: <span id="count-events">loading...</span></li>
      <li>People: <span id="count-people">loading...</span></li>
      <li>Units: <span id="count-units">loading...</span></li>
    </ul>

    <h2>Links</h2>
    <ul>
      <li><a href="/apps/timeline-trainer/">Timeline Trainer</a></li>
      <li><a href="/data/events.json">/data/events.json</a></li>
      <li><a href="/data/people.json">/data/people.json</a></li>
      <li><a href="/data/units/index.json">/data/units/index.json</a></li>
    </ul>

    <script type="module">
      async function fetchJson(path) {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status} for ${path}`);
        return response.json();
      }

      async function loadCounts() {
        try {
          const [events, people, unitIndex] = await Promise.all([
            fetchJson("/data/events.json"),
            fetchJson("/data/people.json"),
            fetchJson("/data/units/index.json"),
          ]);

          if (!Array.isArray(events)) throw new Error("events.json must be an array");
          if (!Array.isArray(people)) throw new Error("people.json must be an array");
          if (!unitIndex || !Array.isArray(unitIndex.units)) {
            throw new Error("units/index.json must contain a units array");
          }

          document.getElementById("count-events").textContent = String(events.length);
          document.getElementById("count-people").textContent = String(people.length);
          document.getElementById("count-units").textContent = String(unitIndex.units.length);
        } catch (error) {
          console.error("Failed loading counts", error);
          document.getElementById("count-events").textContent = "—";
          document.getElementById("count-people").textContent = "—";
          document.getElementById("count-units").textContent = "—";
        }
      }

      loadCounts();
    </script>
  </body>
</html>
