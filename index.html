<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <link rel="manifest" href="/pwa/manifest.webmanifest" />
    <link rel="icon" href="/assets/pwa/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/assets/pwa/apple-touch-icon.svg" />
    <title>World History Lab</title>
    <style>
      :root {
        --bg: #f8fafc;
        --panel: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --accent: #0f766e;
        --border: #dbe2ea;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      #main {
        width: min(760px, calc(100% - 1.5rem));
        margin: 2rem auto;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1.2rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 2.4rem);
      }

      #intro {
        margin: 0.6rem 0 0;
        color: var(--muted);
      }

      #primary {
        margin: 20px 0;
      }

      #start-btn {
        font-size: 20px;
        padding: 12px 24px;
        border: 0;
        border-radius: 10px;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }

      #start-btn:hover,
      #start-btn:focus-visible {
        background: #115e59;
      }

      #modes {
        margin-top: 0.4rem;
      }

      #modes h2 {
        margin: 0;
        font-size: 1.2rem;
      }

      #modes ul {
        list-style: none;
        padding: 0;
        margin: 0.55rem 0 0;
      }

      #modes li {
        margin: 8px 0;
        color: var(--muted);
      }

      #modes a {
        color: var(--accent);
        font-weight: 700;
      }

      @media (max-width: 640px) {
        #main {
          margin: 1rem auto;
          padding: 1rem;
        }

        #start-btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="main">
      <h1>World History Lab</h1>
      <p id="intro">Start with one guided session, then use focused practice modes to deepen specific skills.</p>

      <div id="primary">
        <button id="start-btn" type="button">Start Learning</button>
      </div>

      <div id="modes">
        <h2>Practice Modes</h2>
        <ul>
          <li><a href="/apps/timeline-trainer/">Timeline</a> – place events in time</li>
          <li><a href="/apps/causal-chain/">Causality</a> – understand cause and effect</li>
          <li><a href="/apps/event-comparison/">Comparison</a> – compare events</li>
          <li><a href="/apps/map-quiz/">Map</a> – learn where events happened</li>
        </ul>
      </div>
    </div>

    <script>
      document.getElementById('start-btn').onclick = () => {
        window.location.href = '/apps/session-runner/';
      };
    </script>
    <script type="module" src="/pwa/register-sw.js"></script>
  </body>
</html>
